apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-app
  labels:
    app: order-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-app
  template:
    metadata:
      labels:
        app: order-app
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: order-app
          image: sagiransari/order-service:0.0.1-SNAPSHOT
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5" ]
          ports:
            - containerPort: 8081
          env:
            - name: CATALOG_URL
              value: http://catalog-service/books/
          volumeMounts:
            - name: order-service-volume
              mountPath: /workspace/config
          resources:
            requests:
              memory: "756Mi"
              cpu: "0.5"
            limits:
              memory: "756Mi"
      volumes:
        - name: order-service-volume
          configMap:
            name: order-service-config-map